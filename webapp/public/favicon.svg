<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- StrongARM Sizing Console — 래치 크로스커플(X) 모티프, 계기판 팔레트 -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#0a0f1a" stroke="#1f2b3f" stroke-width="1"/>
  <!-- 전원 레일 -->
  <line x1="6" y1="7" x2="26" y2="7" stroke="#2a3a55" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="6" y1="25" x2="26" y2="25" stroke="#2a3a55" stroke-width="1.6" stroke-linecap="round"/>
  <!-- 크로스커플 X : teal ↘ / indigo ↙ -->
  <line x1="9" y1="10.5" x2="23" y2="21.5" stroke="#35d0c0" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="23" y1="10.5" x2="9" y2="21.5" stroke="#8b7dff" stroke-width="2.6" stroke-linecap="round"/>
  <!-- 노드 점 -->
  <circle cx="9"  cy="10.5" r="2.1" fill="#35d0c0"/>
  <circle cx="23" cy="21.5" r="2.1" fill="#35d0c0"/>
  <circle cx="23" cy="10.5" r="2.1" fill="#8b7dff"/>
  <circle cx="9"  cy="21.5" r="2.1" fill="#8b7dff"/>
  <!-- 교차점 하이라이트 -->
  <circle cx="16" cy="16" r="1.7" fill="#dce6f2"/>
</svg>
